{% load static %}

<!DOCTYPE html>
<html>
<head>

    <title>{{ season.name }}</title>

    <style>

        body{
            background:black;
            margin:0;
            padding:0;
            font-family:Arial;
        }

        .container{
            width:90%;
            margin:auto;
            padding:40px 0;
        }

        .title{
            text-align:center;
            color:gold;
            font-size:55px;
            margin-bottom:20px;
        }

        .back-btn{
            display:inline-block;
            margin-bottom:40px;
            color:black;
            background:gold;
            padding:12px 25px;
            border-radius:10px;
            text-decoration:none;
            font-weight:bold;
        }

        .gallery-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
            gap:25px;
        }

        .gallery-card{
    background:#111;
    border:2px solid gold;
    border-radius:15px;
    overflow:hidden;
    margin-bottom:30px;
}

        .gallery-card img{
          width:100%;
    height:auto;
    display:block;
}
        .gallery-card h3{
            color:white;
            text-align:center;
            padding:15px;
        }

    </style>

</head>

<body>

<div class="container">

    <a href="/gallery/" class="back-btn">← Back to Gallery</a>

    <h1 class="title">{{ season.name }}</h1>

    <div class="gallery-grid">

        {% for image in images %}

        <div class="gallery-card">

            <img src="{{ image.image.url }}">

            <h3>{{ image.title }}</h3>

        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
