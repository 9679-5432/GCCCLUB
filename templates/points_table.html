{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="points-page">

    <h1>GSPL POINTS TABLE</h1>

    <table class="points-table">

        <tr>
            <th>Team</th>
            <th>M</th>
            <th>W</th>
            <th>L</th>
            <th>PTS</th>
            <th>NRR</th>
        </tr>

        {% for team in table %}

        <tr>
<td class="team-column">

{% if team.logo %}
    <img src="{{ team.logo.url }}" class="team-logo">
{% else %}
    <img src="/media/stadium.png" class="team-logo">
{% endif %}

<div class="team-name">
    {{ team.team }}
</div>

</td>
            <td>{{ team.matches }}</td>
            <td>{{ team.wins }}</td>
            <td>{{ team.losses }}</td>
            <td>{{ team.points }}</td>
            <td>{{ team.nrr }}</td>
        </tr>

        {% endfor %}

    </table>

</div>

{% endblock %}
