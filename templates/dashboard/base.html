{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GSPL Admin Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'dashboard/css/style.css' %}">

</head>

<body>

<div class="wrapper">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">

            <h2>🏏 GSPL</h2>

        </div>

        <ul>

            <li>
                <a href="/dashboard/">
                    <i class="fa-solid fa-house"></i>
                    Dashboard
                </a>
            </li>

            <li>
                <a href="/dashboard/registrations/">
                    <i class="fa-solid fa-user-plus"></i>
                    Registrations
                </a>
            </li>

            <li>
                <a href="{% url 'dashboard_players' %}">
    👥 Players
</a>
            </li>


        </ul>

    </aside>

    <!-- Main -->

    <main class="main">

        <!-- Top Bar -->

        <header class="topbar">

            <h3>GSPL Admin Dashboard</h3>

        </header>

        <div class="content">

            {% block content %}

            {% endblock %}

        </div>

    </main>

</div>

<script src="{% static 'dashboard/js/script.js' %}"></script>

</body>

</html>
